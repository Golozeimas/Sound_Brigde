<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundBrigde - Midnight Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/ui.css">
<link rel="stylesheet" href="css/player.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="home">

<div id="app">
  <nav id="sidebar">
    <div class="logo">
      <div class="logo-mark"><img src="imgs/sound.png" alt="SoundBrigde logo"></div>
      <div class="logo-text">
        <span class="logo-name">SoundBrigde</span>
        <span class="logo-sub">Midnight Studio</span>
      </div>
    </div>
    <div class="nav">
      <div class="nav-item active" data-page="home" onclick="navigate('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Início
      </div>
      <div class="nav-item" data-page="search" onclick="window.location.href='search.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Pesquisa
      </div>
      <div class="nav-item" data-page="library" onclick="window.location.href='playlist.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Biblioteca
      </div>
    </div>
  </nav>

  <main id="main">
    <div id="page"></div>
  </main>

  <div id="player">
    <div class="player-track">
      <div class="player-art"><img id="playerArt" src="" alt="" style="display:none"></div>
      <div class="player-info">
        <div class="player-name" id="playerName">Selecione uma música</div>
        <div class="player-artist" id="playerArtist">—</div>
      </div>
      <button class="player-fav" id="playerFav" onclick="togglePlayerFav()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>
    <div class="player-controls">
      <div class="ctrl-btns">
        <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Aleatório">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="ctrl-btn play-adjacent" onclick="prevTrack()" title="Anterior">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
        </button>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="ctrl-btn play-adjacent" onclick="nextTrack()" title="Próximo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
        <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repetir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="progress-wrap">
        <span class="progress-time" id="progCur">0:00</span>
        <div class="progress-bar" id="progressBar" onclick="seekTo(event)">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="progress-time" id="progTotal">0:00</span>
      </div>
    </div>
    <div class="player-right">
      <div class="vol-wrap">
        <div class="vol-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        </div>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
      </div>
    </div>
  </div>

  <nav id="mobile-nav">
    <div class="mob-nav-items">
      <div class="mob-nav-item active" data-page="home" onclick="navigate('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Início
      </div>
      <div class="mob-nav-item" data-page="search" onclick="window.location.href='search.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Pesquisa
      </div>
      <div class="mob-nav-item" data-page="library" onclick="window.location.href='playlist.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Biblioteca
      </div>
      <div class="mob-nav-item" onclick="showToast('Perfil')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Perfil
      </div>
    </div>
  </nav>

  <div id="toast"></div>
</div>

<audio id="audioEl"></audio>

<script src="js/app-state.js"></script>
<script src="js/app-api.js"></script>
<script src="js/app-render.js"></script>
<script src="js/app-search.js"></script>
<script src="js/app-player.js"></script>
<script src="js/app-favorites.js"></script>
<script src="script.js"></script>
</body>
</html>
